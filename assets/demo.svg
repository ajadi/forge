<svg xmlns="http://www.w3.org/2000/svg" width="780" height="360" role="img" viewBox="0 0 780 360">
  <title>Forge: one prompt routes a gated multi-agent pipeline; role violations are blocked by hooks</title>
  <desc>Animated walkthrough of a Forge /f-fix run: PM routes L3 pipeline, role-write-guard hook blocks a developer overreach, and reality-check gates the final result.</desc>
    <style>
      @keyframes sh{from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:translateX(0)}}
      .l0{animation:sh .15s ease 0.3s both;}
      .l1{animation:sh .15s ease 0.9s both;}
      .l2{animation:sh .15s ease 1.5s both;}
      .l3{animation:sh .15s ease 2.0s both;}
      .l4{animation:sh .15s ease 2.4s both;}
      .l5{animation:sh .15s ease 2.9s both;}
      .l6{animation:sh .15s ease 3.3s both;}
      .l7{animation:sh .15s ease 3.8s both;}
      .l8{animation:sh .15s ease 4.2s both;}
      .l9{animation:sh .15s ease 4.6s both;}
    </style>
  <rect width="780" height="360" rx="8" fill="#0d1117"/>
  <rect width="780" height="38" rx="8" fill="#161b22"/>
  <rect y="30" width="780" height="8" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>
  <text x="390" y="24" text-anchor="middle" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="13" fill="#8b949e">forge ⚒️ — your AI dev team, gated by hooks</text>
  <text x="20" y="56" class="l0" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="13" font-weight="400" fill="#6e7681"># /f-fix → Forge routes a pipeline, not one lone agent</text>
  <text x="20" y="84" class="l1" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="15" font-weight="400" fill="#c9d1d9">you ›  /f-fix  add rate-limiting to the API</text>
  <text x="20" y="112" class="l2" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="400" fill="#2f81f7">pm  ›  L3 — architect → dev → review ∥ security → verify</text>
  <text x="20" y="140" class="l3" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="400" fill="#d2a8ff">├─ architect     ›  token-bucket, Redis-backed        ✓</text>
  <text x="20" y="168" class="l4" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="400" fill="#c9d1d9">├─ developer     ›  middleware + unit tests           ✓</text>
  <text x="20" y="196" class="l5" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="400" fill="#d29922">│  developer     ›  tries to PASS its own task…</text>
  <text x="20" y="224" class="l6" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="400" fill="#f85149">│  ⊘ role-write-guard hook — BLOCKED</text>
  <text x="20" y="252" class="l7" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="400" fill="#f0883e">├─ code-review   ›  2 findings → fixed                 ✓</text>
  <text x="20" y="280" class="l8" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="400" fill="#3fb950">└─ reality-check ›  verified vs real code      ✓ PASSED</text>
  <text x="20" y="308" class="l9" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="15" font-weight="700" fill="#e3b341">Roles enforced by hooks. Pipelined by complexity. No infra.</text>
</svg>